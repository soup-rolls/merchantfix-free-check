<!doctype html>

      *{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;background:linear-gradient(90deg,rgba(23,79,65,.045) 1px,transparent 1px),linear-gradient(180deg,rgba(23,79,65,.035) 1px,transparent 1px),linear-gradient(180deg,#fbfdfd 0%,var(--paper) 100%);background-size:44px 44px,44px 44px,auto;color:var(--ink)}main{width:min(760px,100%);padding:48px clamp(20px,6vw,64px)}a{color:inherit}.brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;font-weight:900}.brand img{width:32px;height:32px}.eyebrow{margin:44px 0 12px;color:var(--accent);font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:0}h1{margin:0;font-size:clamp(42px,7vw,78px);line-height:1;letter-spacing:0}.lede{max-width:620px;margin:22px 0 0;color:var(--muted);font-size:19px;line-height:1.5}.links{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.primary,.secondary{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:6px;text-decoration:none;font-weight:900}.primary{background:var(--accent);color:#fff}.secondary{border:1px solid var(--line);background:#fbfdfc;color:var(--accent-dark)}@media(max-width:720px){.primary,.secondary{width:100%}}@media(prefers-color-scheme:dark){:root{--ink:#f4f6f1;--muted:#bcc4b6;--line:#314036;--paper:#101612;--accent:#78c5a7;--accent-dark:#a9e3c7}body{background:linear-gradient(180deg,#101612 0%,#0d120f 100%)}.secondary{background:#141a16;color:var(--accent)}}
